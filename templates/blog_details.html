<!DOCTYPE html>
<html lang="en">
<head>

    <title>{{ blog.title }}</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/client.css') }}">

</head>
<body>

<section class="recipe-details">

    <div class="recipe-details-card">

        <img src="{{ blog.image }}">

        <h1>{{ blog.title }}</h1>

        <br>

        <p>
            {{ blog.content }}
        </p>

        <br>

        <span class="category">

            Author:
            {{ blog.author }}

        </span>

    </div>

</section>

</body>
</html>
